<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Research & Publications | Adesina S. Arojo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(71, 85, 105, 0.3); }
        body { background-color: #0f172a; scroll-behavior: smooth; }
    </style>
</head>
<body class="text-slate-200 p-4 md:p-8">
    <div class="max-w-4xl mx-auto">
        <a href="index.html" class="text-emerald-500 text-xs font-bold uppercase tracking-widest mb-12 inline-block hover:gap-2 transition-all">
            <i class="fas fa-arrow-left mr-2"></i> Back to Portfolio
        </a>
        
        <header class="mb-12">
            <h1 class="text-4xl font-bold text-white mb-3">Research & Articles</h1>
            <p class="text-slate-400">Archived papers, publications, and academic inquiries.</p>
        </header>

        <div id="publications-list" class="space-y-6">
            <!-- JavaScript will inject cards here -->
        </div>
    </div>

    <script src="publications-data.js"></script>
    <script>
        const listContainer = document.getElementById('publications-list');
        
        publicationsData.forEach(pub => {
            const card = `
                <div class="glass-card p-8 rounded-3xl group hover:border-emerald-500/50 transition-all">
                    <div class="flex justify-between items-start mb-4">
                        <span class="text-emerald-400 text-[10px] font-bold uppercase tracking-widest border border-emerald-500/20 px-2 py-1 rounded">${pub.category}</span>
                        <span class="text-slate-500 text-xs font-mono">${pub.year}</span>
                    </div>
                    <h2 class="text-xl font-bold text-white mb-3 group-hover:text-emerald-400 transition">${pub.title}</h2>
                    <p class="text-slate-400 text-sm mb-6">${pub.excerpt}</p>
                    <div class="flex flex-wrap gap-4">
                        <a href="article-detail.html?id=${pub.id}" class="bg-emerald-600 hover:bg-emerald-700 text-white text-xs font-bold px-6 py-2.5 rounded-xl transition shadow-lg shadow-emerald-900/20">Read Full Paper</a>
                        ${pub.academiaLink ? `<a href="${pub.academiaLink}" target="_blank" class="border border-slate-700 hover:border-emerald-500 text-slate-400 hover:text-white text-xs font-bold px-6 py-2.5 rounded-xl transition">Academia.edu <i class="fas fa-external-link-alt ml-2 text-[10px]"></i></a>` : ''}
                    </div>
                </div>
            `;
            listContainer.innerHTML += card;
        });
    </script>
</body>
</html>
